{% extends "base.html" %}

{% block title %}Login | MalGuard AI{% endblock %}

{% block content %}

<div class="login-page">

    <div class="login-card">

        <div class="login-header">

            <i class="fa-solid fa-shield-halved"></i>

            <h1>MalGuard AI</h1>

            <p>Intelligent Malware Detection Platform</p>

        </div>

        <form method="POST">

            <div class="input-group">

                <label>Username</label>

                <div class="input-box">

                    <i class="fa-solid fa-user"></i>

                    <input
                        type="text"
                        name="username"
                        placeholder="Enter Username"
                        required>

                </div>

            </div>

            <div class="input-group">

                <label>Password</label>

                <div class="input-box">

                    <i class="fa-solid fa-lock"></i>

                    <input
                        type="password"
                        id="password"
                        name="password"
                        placeholder="Enter Password"
                        required>

                    <i class="fa-solid fa-eye eye-icon"
                       id="togglePassword"></i>

                </div>

            </div>

            <div class="remember">

                <input type="checkbox">

                <span>Remember Me</span>

            </div>

            {% if error %}
            <div class="error-message">
                {{ error }}
            </div>
            {% endif %}

            <button type="submit" class="login-btn">
                Secure Login
            </button>

        </form>

        <div class="back-home">

            <a href="{{ url_for('home') }}">
                ← Back to Home
            </a>

        </div>

    </div>

</div>

{% endblock %}
